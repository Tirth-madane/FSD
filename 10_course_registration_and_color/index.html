<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="React course registration portal with dynamic updates and background color changer controls">
  <title>Course Registrations & Color Panel</title>
  <link rel="stylesheet" href="style.css">
  <!-- Load React, ReactDOM, and Babel from CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Float Confirmation Toast -->
  <div class="toast-msg" id="toast-notify">Confirmation Alert</div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SEED_COURSES = [
      { id: 1, code: "CS-101", title: "Introduction to Computer Systems", instructor: "Dr. Nathan Vance", status: "Active" },
      { id: 2, code: "EE-205", title: "Circuit Logic & Theory", instructor: "Prof. Sarah Jenkins", status: "Active" },
      { id: 3, code: "MA-302", title: "Advanced Calculus II", instructor: "Dr. Clara Oswald", status: "Inactive" }
    ];

    function App() {
      const [courses, setCourses] = useState(SEED_COURSES);
      
      // Course Form states
      const [code, setCode] = useState('');
      const [title, setTitle] = useState('');
      const [instructor, setInstructor] = useState('');
      const [status, setStatus] = useState('Active');
      
      // Edit states
      const [editingCourseId, setEditingCourseId] = useState(null);

      // Part A: Add/Update Course Dynamic Actions
      const handleSaveCourse = (e) => {
        e.preventDefault();
        if (!code || !title || !instructor) return;

        if (editingCourseId !== null) {
          // Update Mode
          setCourses(prevCourses => 
            prevCourses.map(c => c.id === editingCourseId 
              ? { ...c, code, title, instructor, status } 
              : c
            )
          );
          setEditingCourseId(null);
          triggerToast("Course details updated successfully!");
        } else {
          // Add Mode
          const newCourse = {
            id: Date.now(),
            code,
            title,
            instructor,
            status
          };
          setCourses([...courses, newCourse]);
          triggerToast(`Course ${code} added!`);
        }

        // Reset Inputs
        setCode('');
        setTitle('');
        setInstructor('');
        setStatus('Active');
      };

      const handleEditClick = (course) => {
        setEditingCourseId(course.id);
        setCode(course.code);
        setTitle(course.title);
        setInstructor(course.instructor);
        setStatus(course.status);
      };

      const handleDeleteCourse = (id, codeVal) => {
        if (!confirm(`Are you sure you want to remove ${codeVal}?`)) return;
        setCourses(courses.filter(c => c.id !== id));
        triggerToast(`Course ${codeVal} removed.`);
      };

      // Part B: Background Color Changer JavaScript manipulation function
      const changeBackgroundColor = (hexColor, colorName) => {
        // Dynamic DOM Manipulation: Update body background
        document.body.style.backgroundColor = hexColor;

        // Display toast message with custom animation and detail content
        triggerToast(`Background theme shifted to: ${colorName} (${hexColor})`);
      };

      const triggerToast = (msg) => {
        const toast = document.getElementById('toast-notify');
        toast.innerText = msg;
        toast.classList.add('show-toast');
        
        // Remove toast banner after 2.5s
        setTimeout(() => {
          toast.classList.remove('show-toast');
        }, 2500);
      };

      // Palette themes
      const colorOptions = [
        { hex: "#eef2ff", name: "Soft Sky" },
        { hex: "#fef3c7", name: "Sunny Glow" },
        { hex: "#dcfce7", name: "Mint Whisper" },
        { hex: "#ede9fe", name: "Lavender Mist" },
        { hex: "#f8fafc", name: "Cloud White" }
      ];

      return (
        <div className="container">
          <div style={{ textAlign: 'center', marginBottom: '3rem' }}>
            <h1 style={{ fontSize: '2.4rem', fontWeight: 700, marginBottom: '0.5rem' }}>Course Manager & Style Hub</h1>
            <p style={{ color: 'var(--text-muted)' }}>React registration grid combined with dynamic page backdrop color controllers.</p>
          </div>

          {/* Part B Panel: Background Color Changer */}
          <div className="panel">
            <h2>Dynamic Background Theme Panel</h2>
            <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem', marginBottom: '1.2rem' }}>
              Click a color node below. It runs a JavaScript function that manipulates the document body background styling and displays an animated toast.
            </p>
            <div class="color-btn-group">
              {colorOptions.map((col, idx) => (
                <button
                  key={idx}
                  className="color-dot"
                  style={{ backgroundColor: col.hex }}
                  onClick={() => changeBackgroundColor(col.hex, col.name)}
                  title={col.name}
                />
              ))}
            </div>
          </div>

          {/* Part A Panel: Course Registration Dashboard */}
          <div className="panel">
            <h2>{editingCourseId !== null ? "Edit Course Entry" : "Register New Course"}</h2>
            
            <form onSubmit={handleSaveCourse}>
              <div className="form-row">
                <div className="form-group" style={{ flex: '0 0 120px' }}>
                  <label>Course Code</label>
                  <input 
                    type="text" 
                    className="form-control" 
                    placeholder="e.g. CS-102"
                    value={code}
                    onChange={e => setCode(e.target.value)}
                    required
                  />
                </div>
                <div className="form-group">
                  <label>Course Title</label>
                  <input 
                    type="text" 
                    className="form-control" 
                    placeholder="e.g. Intro to Logic Systems"
                    value={title}
                    onChange={e => setTitle(e.target.value)}
                    required
                  />
                </div>
                <div className="form-group">
                  <label>Instructor Name</label>
                  <input 
                    type="text" 
                    className="form-control" 
                    placeholder="e.g. Dr. Vance"
                    value={instructor}
                    onChange={e => setInstructor(e.target.value)}
                    required
                  />
                </div>
                <div className="form-group" style={{ flex: '0 0 120px' }}>
                  <label>Status</label>
                  <select 
                    className="form-control" 
                    value={status}
                    onChange={e => setStatus(e.target.value)}
                  >
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                  </select>
                </div>
              </div>
              
              <div style={{ display: 'flex', gap: '0.5rem' }}>
                <button type="submit" className="btn">
                  {editingCourseId !== null ? "Update Course" : "Add Course"}
                </button>
                {editingCourseId !== null && (
                  <button 
                    type="button" 
                    className="btn btn-secondary"
                    onClick={() => {
                      setEditingCourseId(null);
                      setCode('');
                      setTitle('');
                      setInstructor('');
                      setStatus('Active');
                    }}
                  >
                    Cancel Edit
                  </button>
                )}
              </div>
            </form>
          </div>

          {/* Courses Table Grid */}
          <div className="panel">
            <h2>Current Course Registrations</h2>
            <div className="course-table-container">
              <table>
                <thead>
                  <tr>
                    <th>Code</th>
                    <th>Course Title</th>
                    <th>Instructor</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {courses.length === 0 ? (
                    <tr>
                      <td colSpan="5" style={{ textAlign: 'center', color: 'var(--text-muted)' }}>No courses registered.</td>
                    </tr>
                  ) : (
                    courses.map(course => (
                      <tr key={course.id}>
                        <td><strong>{course.code}</strong></td>
                        <td>{course.title}</td>
                        <td>{course.instructor}</td>
                        <td>
                          <span className={`status-badge ${course.status === 'Active' ? 'status-active' : 'status-inactive'}`}>
                            {course.status}
                          </span>
                        </td>
                        <td>
                          <div style={{ display: 'flex', gap: '0.5rem' }}>
                            <button 
                              className="btn btn-secondary" 
                              style={{ padding: '0.3rem 0.7rem', fontSize: '0.8rem' }}
                              onClick={() => handleEditClick(course)}
                            >
                              Edit
                            </button>
                            <button 
                              className="btn btn-secondary btn-danger" 
                              style={{ padding: '0.3rem 0.7rem', fontSize: '0.8rem', background: '#ef4444', border: 'none' }}
                              onClick={() => handleDeleteCourse(course.id, course.code)}
                            >
                              Delete
                            </button>
                          </div>
                        </td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
